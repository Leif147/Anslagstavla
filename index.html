<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital anslagstavla</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <h1>Digital anslagstavla</h1>
            <p>Lägg till, redigera och bocka av poster med signering.</p>
        </header>

        <section class="panel form-panel" aria-labelledby="form-title">
            <h2 id="form-title">Ny post</h2>

            <form id="post-form" novalidate>
                <input type="hidden" id="editing-id" value="">

                <div class="field">
                    <label for="title">Rubrik</label>
                    <input id="title" name="title" type="text" maxlength="120" required>
                </div>

                <div class="field">
                    <label for="description">Beskrivning</label>
                    <textarea id="description" name="description" rows="3" maxlength="600" required></textarea>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="category">Kategori</label>
                        <input id="category" name="category" type="text" list="category-options" placeholder="Ex. Underhåll" maxlength="60" required>
                        <datalist id="category-options">
                            <option value="Underhåll"></option>
                            <option value="Verkstadsutrustning"></option>
                            <option value="Reparationer"></option>
                        </datalist>
                    </div>

                    <div class="field">
                        <label for="priority">Prioritet</label>
                        <select id="priority" name="priority">
                            <option value="Normal">Normal</option>
                            <option value="Viktig">Viktig</option>
                            <option value="Akut">Akut</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label for="initials">Initialer (skapare/redigerare)</label>
                    <input id="initials" name="initials" type="text" maxlength="6" placeholder="Ex. AB" required>
                </div>

                <div class="actions">
                    <button type="submit" id="save-button">Lägg till post</button>
                    <button type="button" id="cancel-edit" class="ghost hidden">Avbryt redigering</button>
                </div>
            </form>
        </section>

        <section class="panel list-panel" aria-labelledby="list-title">
            <div class="list-header">
                <h2 id="list-title">Poster</h2>
                <p id="post-count">0 poster</p>
            </div>
            <div class="filters" aria-label="Filtrering">
                <div class="field">
                    <label for="filter-category">Filtrera kategori</label>
                    <select id="filter-category" name="filter-category">
                        <option value="">Alla kategorier</option>
                    </select>
                </div>

                <div class="field">
                    <label for="filter-priority">Filtrera prioritet</label>
                    <select id="filter-priority" name="filter-priority">
                        <option value="">Alla prioriteter</option>
                        <option value="Normal">Normal</option>
                        <option value="Viktig">Viktig</option>
                        <option value="Akut">Akut</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <p id="filter-status" class="filter-status" aria-live="polite"></p>
                <button type="button" id="reset-filters" class="ghost">Nollställ filter</button>
            </div>
            <div id="post-list" class="post-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
